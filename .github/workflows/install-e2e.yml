name: Install E2E

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  e2e-unix:
    name: E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run install/update/uninstall scripts
        shell: bash
        env:
          SKILLS_REPO: ${{ github.workspace }}
          SKILLS_REF: main
          INSTALL_TARGET: all
          UPDATE_MODE: force
          UPDATE_TARGET: all
          PRUNE_MODE: on
          UNINSTALL_TARGET: all
          CODEX_AUTO_UPDATE_SETUP: off
          NON_INTERACTIVE: "1"
        run: |
          set -euo pipefail
          export HOME="$RUNNER_TEMP/agent-skills-home"
          mkdir -p "$HOME"

          for target in claude codex gemini both all; do
            INSTALL_TARGET="$target" DRY_RUN=1 bash scripts/install.sh --non-interactive
          done

          bash scripts/install.sh --non-interactive --dry-run
          bash scripts/install.sh --non-interactive

          test -f "$HOME/.claude/skills/code-reviewer/SKILL.md"
          test -f "$HOME/.codex/skills/code-reviewer/SKILL.md"
          test -f "$HOME/.gemini/skills/code-reviewer/SKILL.md"
          test -f "$HOME/.claude/workflows/full-auto-development/WORKFLOW.md"
          test -f "$HOME/.codex/workflows/full-auto-development/WORKFLOW.md"

          bash scripts/update.sh
          bash scripts/uninstall.sh

          test ! -d "$HOME/.claude/skills/code-reviewer"
          test ! -d "$HOME/.codex/skills/code-reviewer"
          test ! -d "$HOME/.gemini/skills/code-reviewer"

  e2e-windows:
    name: E2E (windows-latest)
    runs-on: windows-latest
    env:
      SKILLS_REPO: ${{ github.workspace }}
      SKILLS_REF: ci-local-ref
      INSTALL_TARGET: all
      UPDATE_MODE: force
      UPDATE_TARGET: all
      PRUNE_MODE: on
      UNINSTALL_TARGET: all
      CODEX_AUTO_UPDATE_SETUP: off
      NON_INTERACTIVE: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare local ref
        shell: pwsh
        run: git branch -f ci-local-ref $env:GITHUB_SHA

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Prepare home
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:USERPROFILE = Join-Path $env:RUNNER_TEMP "agent-skills-home"
          New-Item -ItemType Directory -Path $env:USERPROFILE -Force | Out-Null
          $env:HOME = $env:USERPROFILE

      - name: Install dry-run
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:USERPROFILE = Join-Path $env:RUNNER_TEMP "agent-skills-home"
          $env:HOME = $env:USERPROFILE
          foreach ($target in @("claude", "codex", "gemini", "both", "all")) {
            $env:INSTALL_TARGET = $target
            $env:DRY_RUN = "1"
            & "$env:GITHUB_WORKSPACE\scripts\install.ps1"
          }

      - name: Install
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:USERPROFILE = Join-Path $env:RUNNER_TEMP "agent-skills-home"
          $env:HOME = $env:USERPROFILE
          $env:DRY_RUN = "0"
          & "$env:GITHUB_WORKSPACE\scripts\install.ps1"

      - name: Assert install artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:USERPROFILE = Join-Path $env:RUNNER_TEMP "agent-skills-home"
          $env:HOME = $env:USERPROFILE

          if (-not (Test-Path "$env:USERPROFILE\.claude\skills\code-reviewer\SKILL.md")) { throw "Claude skill missing" }
          if (-not (Test-Path "$env:USERPROFILE\.codex\skills\code-reviewer\SKILL.md")) { throw "Codex skill missing" }
          if (-not (Test-Path "$env:USERPROFILE\.gemini\skills\code-reviewer\SKILL.md")) { throw "Gemini skill missing" }
          if (-not (Test-Path "$env:USERPROFILE\.claude\workflows\full-auto-development\WORKFLOW.md")) { throw "Claude workflow missing" }
          if (-not (Test-Path "$env:USERPROFILE\.codex\workflows\full-auto-development\WORKFLOW.md")) { throw "Codex workflow missing" }

      - name: Update
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:USERPROFILE = Join-Path $env:RUNNER_TEMP "agent-skills-home"
          $env:HOME = $env:USERPROFILE
          & "$env:GITHUB_WORKSPACE\scripts\update.ps1"

      - name: Uninstall
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:USERPROFILE = Join-Path $env:RUNNER_TEMP "agent-skills-home"
          $env:HOME = $env:USERPROFILE
          & "$env:GITHUB_WORKSPACE\scripts\uninstall.ps1"

      - name: Assert uninstall cleanup
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:USERPROFILE = Join-Path $env:RUNNER_TEMP "agent-skills-home"
          $env:HOME = $env:USERPROFILE
          if (Test-Path "$env:USERPROFILE\.claude\skills\code-reviewer") { throw "Claude uninstall failed" }
          if (Test-Path "$env:USERPROFILE\.codex\skills\code-reviewer") { throw "Codex uninstall failed" }
          if (Test-Path "$env:USERPROFILE\.gemini\skills\code-reviewer") { throw "Gemini uninstall failed" }
